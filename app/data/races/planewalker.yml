key: planewalker
name: Planewalker
alignment: evil
description: >-
  <p>Cunning and ancient, the Planewalkers are wanderers who travel between worlds, treating each plane as a medium to be shaped. Where others quarry stone or till the soil, they summon form from the elements themselves, raising silent guardians from root and earth and breathing purpose into wind and water.</p>
  <p>Since much of their population is conjured rather than born to this world, traditional dwellings serve them poorly. Their numbers are sustained through ceaseless acts of will and those who tire often turn away from creation and instead listen to the whispers beyond, returning with unsettling truths and fragments of knowledge mortals were never meant to possess.</p>
