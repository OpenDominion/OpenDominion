  <p>Gnomes are the masters of the mechanical, always tinkering with their latest inventions. Though much of their genius is applied to improve the lives of their citizens, it also lends a significant shock and awe factor to their military.</p>
  <p>With great hulking juggernauts of cogs and steel they are intimidating despite their small statures, and the bigger the enemy the harder they fight. Their unpredictably explosive infantry squads make taking on any Gnomish army an unnerving experience.</p>
